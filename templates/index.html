<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LocalDrop</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  <style>
    /* ══════════════════════════════════════════
       Design tokens
    ══════════════════════════════════════════ */
    :root {
      --bg:        #0d0f14;
      --surface:   #161921;
      --card:      #1c2030;
      --border:    #252a3a;
      --accent:    #4f8ef7;
      --accent2:   #7c5cf7;
      --success:   #3ecf8e;
      --danger:    #f75f5f;
      --warn:      #f7b955;
      --text:      #e4e8f5;
      --muted:     #6b7394;
      --mono:      'Space Mono', monospace;
      --sans:      'DM Sans', sans-serif;
    }

    /* ══════════════════════════════════════════
       Reset & base
    ══════════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* Subtle grid background */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(79,142,247,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(79,142,247,.03) 1px, transparent 1px);
      background-size: 32px 32px;
      pointer-events: none;
    }

    /* ══════════════════════════════════════════
       Layout
    ══════════════════════════════════════════ */
    .app-wrap {
      position: relative; z-index: 1;
      max-width: 820px;
      margin: 0 auto;
      padding: 24px 16px 80px;
    }

    /* ══════════════════════════════════════════
       Header
    ══════════════════════════════════════════ */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }
    .logo {
      display: flex; align-items: center; gap: 10px;
    }
    .logo-icon {
      width: 38px; height: 38px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .logo-text {
      font-family: var(--mono);
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    .logo-text span { color: var(--accent); }

    .server-badge {
      display: flex; align-items: center; gap: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 12px;
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--muted);
      cursor: pointer;
      transition: border-color .2s, color .2s;
    }
    .server-badge:hover { border-color: var(--accent); color: var(--accent); }
    .server-badge .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--success);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: .4; }
    }

    /* ══════════════════════════════════════════
       Drop zone
    ══════════════════════════════════════════ */
    .drop-zone {
      position: relative;
      border: 2px dashed var(--border);
      border-radius: 16px;
      padding: 48px 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color .25s, background .25s;
      background: var(--surface);
      margin-bottom: 28px;
      overflow: hidden;
    }
    .drop-zone::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(79,142,247,.06), rgba(124,92,247,.06));
      opacity: 0;
      transition: opacity .25s;
    }
    .drop-zone.drag-over,
    .drop-zone:hover {
      border-color: var(--accent);
    }
    .drop-zone.drag-over::after,
    .drop-zone:hover::after { opacity: 1; }
    .drop-zone.drag-over { background: rgba(79,142,247,.05); }

    .drop-icon {
      font-size: 2.8rem;
      margin-bottom: 12px;
      display: block;
      filter: drop-shadow(0 0 16px rgba(79,142,247,.5));
    }
    .drop-title {
      font-size: 1.1rem;
      font-weight: 500;
      margin-bottom: 6px;
    }
    .drop-sub {
      color: var(--muted);
      font-size: 0.88rem;
      margin-bottom: 20px;
    }
    #fileInput { display: none; }
    .btn-pick {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 10px 22px;
      border-radius: 8px;
      font-family: var(--sans);
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: background .2s, transform .15s;
    }
    .btn-pick:hover { background: #3a7de8; transform: translateY(-1px); }
    .btn-pick:active { transform: translateY(0); }

    /* ══════════════════════════════════════════
       Progress list (upload queue)
    ══════════════════════════════════════════ */
    #uploadQueue {
      display: flex; flex-direction: column; gap: 10px;
      margin-bottom: 28px;
    }
    .queue-item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      animation: slideIn .2s ease;
    }
    @keyframes slideIn {
      from { opacity:0; transform: translateY(-8px); }
      to   { opacity:1; transform: translateY(0); }
    }
    .qi-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 8px;
      font-size: 0.85rem;
    }
    .qi-name { font-weight: 500; word-break: break-all; }
    .qi-status { color: var(--muted); font-family: var(--mono); font-size: 0.75rem; white-space: nowrap; margin-left: 12px; }
    .qi-status.done   { color: var(--success); }
    .qi-status.error  { color: var(--danger); }
    .progress-bar-bg {
      height: 4px; background: var(--border); border-radius: 99px; overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 99px;
      transition: width .2s ease;
      width: 0%;
    }

    /* ══════════════════════════════════════════
       Toast messages
    ══════════════════════════════════════════ */
    #toast-container {
      position: fixed; bottom: 24px; right: 24px; z-index: 999;
      display: flex; flex-direction: column; gap: 10px;
      pointer-events: none;
    }
    .toast {
      background: var(--card);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      border-radius: 8px;
      padding: 12px 18px;
      font-size: 0.88rem;
      max-width: 300px;
      pointer-events: all;
      animation: toastIn .3s ease;
      box-shadow: 0 8px 32px rgba(0,0,0,.4);
    }
    .toast.success { border-left-color: var(--success); }
    .toast.error   { border-left-color: var(--danger); }
    .toast.warn    { border-left-color: var(--warn); }
    @keyframes toastIn {
      from { opacity:0; transform: translateX(20px); }
      to   { opacity:1; transform: translateX(0); }
    }

    /* ══════════════════════════════════════════
       File list section
    ══════════════════════════════════════════ */
    .section-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 16px;
    }
    .section-title {
      font-family: var(--mono);
      font-size: 0.85rem;
      color: var(--muted);
      letter-spacing: .08em;
      text-transform: uppercase;
    }
    .file-count-badge {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 99px;
      padding: 2px 10px;
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--accent);
    }

    #fileList { display: flex; flex-direction: column; gap: 8px; }

    .file-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      transition: border-color .2s, background .2s;
      animation: slideIn .25s ease;
    }
    .file-card:hover {
      border-color: rgba(79,142,247,.4);
      background: #1e2438;
    }

    .file-icon {
      width: 40px; height: 40px; flex-shrink: 0;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.25rem;
      background: var(--surface);
    }
    .file-icon.image   { background: rgba(62,207,142,.1); }
    .file-icon.video   { background: rgba(247,95,95,.1); }
    .file-icon.audio   { background: rgba(247,185,85,.1); }
    .file-icon.pdf     { background: rgba(247,95,95,.1); }
    .file-icon.archive { background: rgba(124,92,247,.1); }
    .file-icon.text    { background: rgba(79,142,247,.1); }

    .file-meta { flex: 1; min-width: 0; }
    .file-name {
      font-size: 0.92rem; font-weight: 500;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .file-details {
      font-size: 0.76rem; color: var(--muted);
      font-family: var(--mono);
      display: flex; gap: 12px; flex-wrap: wrap;
      margin-top: 2px;
    }

    .file-actions { display: flex; gap: 8px; flex-shrink: 0; }
    .btn-icon {
      width: 34px; height: 34px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem;
      transition: all .18s;
      text-decoration: none;
    }
    .btn-icon:hover { color: var(--text); border-color: var(--muted); }
    .btn-icon.danger:hover { color: var(--danger); border-color: var(--danger); background: rgba(247,95,95,.08); }
    .btn-icon.primary:hover { color: var(--accent); border-color: var(--accent); background: rgba(79,142,247,.08); }

    /* ══════════════════════════════════════════
       Empty state
    ══════════════════════════════════════════ */
    .empty-state {
      text-align: center;
      padding: 56px 24px;
      color: var(--muted);
    }
    .empty-state .emoji { font-size: 3rem; display: block; margin-bottom: 12px; }
    .empty-state p { font-size: 0.9rem; }

    /* ══════════════════════════════════════════
       QR modal
    ══════════════════════════════════════════ */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 100;
      background: rgba(0,0,0,.7);
      backdrop-filter: blur(6px);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity .25s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 32px;
      max-width: 340px;
      width: 90%;
      text-align: center;
      transform: translateY(12px);
      transition: transform .25s;
    }
    .modal-overlay.open .modal { transform: translateY(0); }
    .modal h2 {
      font-family: var(--mono);
      font-size: 1rem;
      margin-bottom: 6px;
    }
    .modal p { color: var(--muted); font-size: 0.85rem; margin-bottom: 20px; }
    #qrContainer { margin: 0 auto 20px; }
    #qrContainer img { border-radius: 12px; max-width: 200px; }
    .modal-url {
      font-family: var(--mono);
      font-size: 0.78rem;
      color: var(--accent);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 14px;
      word-break: break-all;
      margin-bottom: 16px;
    }
    .btn-close {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      padding: 8px 20px;
      font-family: var(--sans);
      cursor: pointer;
      transition: background .2s;
    }
    .btn-close:hover { background: var(--border); }

    /* ══════════════════════════════════════════
       Responsive
    ══════════════════════════════════════════ */
    @media (max-width: 480px) {
      .drop-zone    { padding: 36px 16px; }
      .drop-icon    { font-size: 2.2rem; }
      .server-badge { display: none; }
      .file-details { gap: 8px; }
    }
  </style>
</head>
<body>

<div class="app-wrap">

  <!-- ── Header ── -->
  <header>
    <div class="logo">
      <div class="logo-icon">📡</div>
      <div class="logo-text">Local<span>Drop</span></div>
    </div>
    <div class="server-badge" onclick="openQR()" title="Click to show QR code">
      <span class="dot"></span>
      <span id="serverAddr">{{ server_ip }}:{{ server_port }}</span>
      &nbsp;◈ QR
    </div>
  </header>

  <!-- ── Drop zone ── -->
  <div class="drop-zone" id="dropZone">
    <span class="drop-icon">⬆</span>
    <div class="drop-title">Drop files here</div>
    <div class="drop-sub">
      or click to browse &nbsp;·&nbsp; max {{ max_mb }} MB per file
    </div>
    <label for="fileInput" class="btn-pick">
      📂 Choose files
    </label>
    <input type="file" id="fileInput" multiple />
  </div>

  <!-- ── Upload queue ── -->
  <div id="uploadQueue"></div>

  <!-- ── File list ── -->
  <div class="section-header">
    <span class="section-title">Shared Files</span>
    <span class="file-count-badge" id="fileCount">0 files</span>
  </div>
  <div id="fileList"></div>

</div><!-- /app-wrap -->

<!-- ── Toast container ── -->
<div id="toast-container"></div>

<!-- ── QR Modal ── -->
<div class="modal-overlay" id="qrModal" onclick="closeQR(event)">
  <div class="modal">
    <h2>📱 Scan to Connect</h2>
    <p>Open this app on any device on your Wi-Fi</p>
    <div id="qrContainer"></div>
    <div class="modal-url" id="qrUrl"></div>
    <button class="btn-close" onclick="closeQR()">Close</button>
  </div>
</div>

<script>
/* ══════════════════════════════════════════════
   State
══════════════════════════════════════════════ */
let files = [];

/* ══════════════════════════════════════════════
   Toast notifications
══════════════════════════════════════════════ */
function toast(msg, type = 'info', duration = 3500) {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => {
    el.style.opacity = '0';
    el.style.transform = 'translateX(20px)';
    el.style.transition = 'all .3s';
    setTimeout(() => el.remove(), 300);
  }, duration);
}

/* ══════════════════════════════════════════════
   File type icon
══════════════════════════════════════════════ */
const ICONS = {
  image: '🖼️', video: '🎬', audio: '🎵',
  pdf: '📄', archive: '📦', text: '📝', other: '📎'
};

/* ══════════════════════════════════════════════
   Render file list
══════════════════════════════════════════════ */
function renderFiles(data) {
  files = data;
  const list = document.getElementById('fileList');
  const badge = document.getElementById('fileCount');
  badge.textContent = `${data.length} file${data.length !== 1 ? 's' : ''}`;

  if (!data.length) {
    list.innerHTML = `
      <div class="empty-state">
        <span class="emoji">🗂️</span>
        <p>No files uploaded yet.<br>Drop something above to get started.</p>
      </div>`;
    return;
  }

  list.innerHTML = data.map(f => `
    <div class="file-card" data-name="${f.name}">
      <div class="file-icon ${f.kind}">${ICONS[f.kind] || '📎'}</div>
      <div class="file-meta">
        <div class="file-name" title="${f.name}">${f.name}</div>
        <div class="file-details">
          <span>${f.size_human}</span>
          <span>${f.uploaded}</span>
        </div>
      </div>
      <div class="file-actions">
        <a  class="btn-icon primary"
            href="/download/${encodeURIComponent(f.name)}"
            title="Download" download>⬇</a>
        <button class="btn-icon danger"
                onclick="deleteFile('${f.name}')"
                title="Delete">🗑</button>
      </div>
    </div>
  `).join('');
}

/* ══════════════════════════════════════════════
   Load files
══════════════════════════════════════════════ */
async function loadFiles() {
  try {
    const r = await fetch('/api/files');
    const data = await r.json();
    renderFiles(data);
  } catch(e) {
    toast('Could not load file list.', 'error');
  }
}

/* ══════════════════════════════════════════════
   Upload with XHR for progress tracking
══════════════════════════════════════════════ */
function uploadFiles(fileList) {
  if (!fileList || !fileList.length) return;

  const queue = document.getElementById('uploadQueue');

  Array.from(fileList).forEach(file => {
    // Create queue item UI
    const item = document.createElement('div');
    item.className = 'queue-item';
    item.innerHTML = `
      <div class="qi-header">
        <span class="qi-name">${file.name}</span>
        <span class="qi-status" id="qs-${file.name.replace(/\W/g,'_')}">0%</span>
      </div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="qp-${file.name.replace(/\W/g,'_')}"></div>
      </div>`;
    queue.prepend(item);

    const statusEl = item.querySelector('.qi-status');
    const fillEl   = item.querySelector('.progress-bar-fill');

    const fd = new FormData();
    fd.append('files', file);

    const xhr = new XMLHttpRequest();
    xhr.open('POST', '/api/upload');

    // Progress
    xhr.upload.onprogress = (e) => {
      if (e.lengthComputable) {
        const pct = Math.round((e.loaded / e.total) * 100);
        fillEl.style.width   = pct + '%';
        statusEl.textContent = pct + '%';
      }
    };

    // Done
    xhr.onload = () => {
      if (xhr.status === 200) {
        fillEl.style.width      = '100%';
        fillEl.style.background = 'var(--success)';
        statusEl.textContent    = 'Done ✓';
        statusEl.className      = 'qi-status done';
        toast(`${file.name} uploaded!`, 'success');
        loadFiles();
        setTimeout(() => item.remove(), 2500);
      } else {
        let msg = 'Upload failed';
        try { msg = JSON.parse(xhr.responseText).error || msg; } catch(e) {}
        statusEl.textContent = 'Error ✗';
        statusEl.className   = 'qi-status error';
        fillEl.style.background = 'var(--danger)';
        toast(msg, 'error');
        setTimeout(() => item.remove(), 4000);
      }
    };

    xhr.onerror = () => {
      statusEl.textContent = 'Network error';
      statusEl.className   = 'qi-status error';
      toast('Network error uploading ' + file.name, 'error');
    };

    xhr.send(fd);
  });

  // Reset input
  document.getElementById('fileInput').value = '';
}

/* ══════════════════════════════════════════════
   Delete
══════════════════════════════════════════════ */
async function deleteFile(name) {
  if (!confirm(`Delete "${name}"?`)) return;
  try {
    const r = await fetch(`/api/delete/${encodeURIComponent(name)}`, { method: 'DELETE' });
    if (r.ok) {
      toast(`${name} deleted.`, 'warn');
      loadFiles();
    } else {
      toast('Could not delete file.', 'error');
    }
  } catch(e) {
    toast('Network error.', 'error');
  }
}

/* ══════════════════════════════════════════════
   Drag & drop
══════════════════════════════════════════════ */
const dropZone = document.getElementById('dropZone');

dropZone.addEventListener('dragover', e => {
  e.preventDefault();
  dropZone.classList.add('drag-over');
});
['dragleave','dragend'].forEach(ev =>
  dropZone.addEventListener(ev, () => dropZone.classList.remove('drag-over'))
);
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  uploadFiles(e.dataTransfer.files);
});
document.getElementById('fileInput').addEventListener('change', e => {
  uploadFiles(e.target.files);
});

/* ══════════════════════════════════════════════
   QR code modal
══════════════════════════════════════════════ */
async function openQR() {
  try {
    const r    = await fetch('/qr');
    const data = await r.json();
    const url  = data.url;

    document.getElementById('qrUrl').textContent = url;
    document.getElementById('qrContainer').innerHTML =
      `<img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&color=4f8ef7&bgcolor=1c2030&data=${encodeURIComponent(url)}" alt="QR Code" />`;

    document.getElementById('qrModal').classList.add('open');
  } catch(e) {
    toast('Could not generate QR code.', 'error');
  }
}
function closeQR(e) {
  if (!e || e.target === document.getElementById('qrModal'))
    document.getElementById('qrModal').classList.remove('open');
}

/* ══════════════════════════════════════════════
   Auto-refresh every 30 seconds
══════════════════════════════════════════════ */
loadFiles();
setInterval(loadFiles, 30000);
</script>
</body>
</html>
