<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LocalDrop — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0d0f14; --surface: #161921; --card: #1c2030;
      --border: #252a3a; --accent: #4f8ef7; --text: #e4e8f5;
      --muted: #6b7394; --danger: #f75f5f;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      background-image:
        linear-gradient(rgba(79,142,247,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(79,142,247,.03) 1px, transparent 1px);
      background-size: 32px 32px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 40px 36px;
      width: 100%; max-width: 360px;
      text-align: center;
    }
    .logo-icon {
      font-size: 2.5rem; margin-bottom: 12px; display: block;
      filter: drop-shadow(0 0 16px rgba(79,142,247,.6));
    }
    h1 {
      font-family: 'Space Mono', monospace;
      font-size: 1.3rem; margin-bottom: 6px;
    }
    h1 span { color: var(--accent); }
    p { color: var(--muted); font-size: 0.88rem; margin-bottom: 28px; }
    input[type="password"] {
      width: 100%; padding: 12px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 1rem;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      transition: border-color .2s;
      margin-bottom: 14px;
    }
    input[type="password"]:focus { border-color: var(--accent); }
    .btn {
      width: 100%; padding: 12px;
      background: var(--accent);
      border: none; border-radius: 10px;
      color: #fff; font-size: 1rem; font-weight: 500;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: background .2s;
    }
    .btn:hover { background: #3a7de8; }
    .error {
      color: var(--danger); font-size: 0.85rem;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <div class="card">
    <span class="logo-icon">📡</span>
    <h1>Local<span>Drop</span></h1>
    <p>Enter the password to access the file server.</p>
    <form method="post">
      <input type="password" name="password" placeholder="Password" autofocus autocomplete="current-password"/>
      <button type="submit" class="btn">Unlock →</button>
    </form>
    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}
  </div>
</body>
</html>
